<html>
<head>
<title> Formulir Pendaftaran </title>
<link rel="stylesheet" href="formulir.css">
</head>
<body>
<div class="kotak">
    <h1> Formulir Pendaftaran Siswa </h1>
	<p class="subjudul"> Isi data dengan lengkap dan benar </p>
	<label> Nama Lengkap* </label>
<div class="kotak3">
	<input type="text" id="name" placeholder="Contoh: Muhammad Raihan">
</div>
	<p class="smalltext"> Nama sesuai identitas </p>
	<label> Kelas* </label>
<div class="kotak3">
	<input type="text" id="kelas" placeholder="Contoh: XII IPA 2/11A/7B">
</div>
	<p class="smalltext"> Kelas saat ini/tujuan </p>
	<label class="title"> Pilih Ekstrakulikuler (3 pilihan) </label>
<div class="kotak3">
	<label>
	    <input type="checkbox" name="cca" value="Basket"> Basket
	</label>
	<label>
	    <input type="checkbox" name="cca" value="Futsal"> Futsal 
	</label>
	<label>
	    <input type="checkbox" name="cca" value="paduansuara"> Paduan Suara 
	</label>
</div>
	<p class="smalltext"> Boleh memilih lebih dari satu (opsional) </p>
	<label class="title"> Pilih Jadwal Belajar (wajib pilih salah satu) </label>
<div class="kotak3">
	<label>
	    <input type="radio" name="jadwal" value="Pagi">Pagi (07.00-12.00) 
	</label>
	<label>
	    <input type="radio" name="jadwal" value="Siang">Siang (12.30-17.00)
	</label>
	<label>
	    <input type="radio" name="jadwal" value="Sore">Sore (17.30-20.30)
	</label>
	<label>
	    <input type="radio" name="jadwal" value="Campuran">Campuran (fleksibel)
	</label>
</div>
	<p class="smalltext"> *satu pilihan wajib dipilih untuk kelengkapan data </p>
	<div>
	    <button id="tampil"> Daftar Sekarang </button>
		<button id="reset">Reset Form</button>
	</div>
	<div class="kotak2" id="hasil">
	</div>
</div>
<script src="formulir.js"></script>
</body>
</html>
